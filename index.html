<style>
  :root {
    --bg: #faf7f2;
    --ink: #2b2620;
    --accent: #8b5e34;
    --user-bubble: #e8dcc8;
    --claude-bubble: #ffffff;
    --light-sq: #f0d9b5;
    --dark-sq: #b58863;

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: Georgia, 'Times New Roman', serif;
    line-height: 1.65;
  }
  header {
    text-align: center;
    padding: 48px 20px 28px;
    border-bottom: 1px solid #e0d6c5;

    display: flex;
    max-width: 1200px;
    margin: 0 auto;
    gap: 36px;
    padding: 36px 20px;
    align-items: flex-start;
  }

  .boardpane {
    width: 380px;
    flex-shrink: 0;
    position: sticky;
    top: 20px;
  }
  @media (max-width: 900px) {
    .layout { flex-direction: column-reverse; }
    .boardpane { width: 100%; position: static; }
  }

  /* Chess board */
  #board {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    grid-template-rows: repeat(8, 1fr);

    aspect-ratio: 1;
    border: 3px solid #6b4f33;
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.12);

    display: flex;
    align-items: center;
    justify-content: center;

    position: relative;
    cursor: default;

  .sq.light { background: var(--light-sq); }
  .sq.dark { background: var(--dark-sq); }
  .sq.hl::after {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--hl);
  }
  .sq .piece { position: relative; z-index: 1; text-shadow: 0 1px 1px rgba(0,0,0,0.25); }

    display: flex;
    gap: 8px;
    margin-top: 12px;
    justify-content: center;
  }

    font-family: inherit;
    font-size: 1rem;
    padding: 8px 18px;

    background: #fff;
    border-radius: 6px;

    font-weight: bold;

    border-radius: 6px;

    line-height: 2;

    padding: 2px 5px;
    border-radius: 4px;

    text-align: center;

</header>

<footer>

</footer>

<script>
// ---- Game data: each ply has from/to squares (file 0-7, rank 0-7 from white's side) ----
const PLIES = [
  {san:'d4',    from:'d2', to:'d4'},
  {san:'Nf6',   from:'g8', to:'f6'},
  {san:'c4',    from:'c2', to:'c4'},
  {san:'e6',    from:'e7', to:'e6'},
  {san:'Nf3',   from:'g1', to:'f3'},
  {san:'b6',    from:'b7', to:'b6'},
  {san:'g3',    from:'g2', to:'g3'},
  {san:'Ba6',   from:'c8', to:'a6'},
  {san:'b3',    from:'b2', to:'b3'},
  {san:'Bb4+',  from:'f8', to:'b4'},
  {san:'Bd2',   from:'c1', to:'d2'},
  {san:'Be7',   from:'b4', to:'e7'},
  {san:'Bg2',   from:'f1', to:'g2'},
  {san:'c6',    from:'c7', to:'c6'},
  {san:'Nc3',   from:'b1', to:'c3'},
  {san:'d5',    from:'d7', to:'d5'},
  {san:'e4',    from:'e2', to:'e4'},

  {san:'Kf8',   from:'e8', to:'f8'},

const GLYPH = { P:'♙', N:'♘', B:'♗', R:'♖', Q:'♕', K:'♔',
                p:'♟', n:'♞', b:'♝', r:'♜', q:'♛', k:'♚' };

function startBoard() {
  const b = {};
  const back = ['R','N','B','Q','K','B','N','R'];
  'abcdefgh'.split('').forEach((f, i) => {
    b[f+'1'] = back[i];
    b[f+'2'] = 'P';
    b[f+'7'] = 'p';
    b[f+'8'] = back[i].toLowerCase();
  });
  return b;
}

// Precompute board state after each ply
const STATES = [{ board: startBoard(), hl: [] }];
{
  let b = { ...startBoard() };
  for (const ply of PLIES) {
    b = { ...b };
    b[ply.to] = b[ply.from];
    delete b[ply.from];
    STATES.push({ board: b, hl: [ply.from, ply.to] });
  }
}

let cur = 0;
const boardEl = document.getElementById('board');
const captionEl = document.getElementById('movecaption');

function render() {
  const { board, hl } = STATES[cur];
  boardEl.innerHTML = '';
  for (let r = 8; r >= 1; r--) {
    for (let f = 0; f < 8; f++) {
      const sq = 'abcdefgh'[f] + r;
      const div = document.createElement('div');
      div.className = 'sq ' + ((f + r) % 2 === 0 ? 'dark' : 'light');
      if (hl.includes(sq)) div.classList.add('hl');
      const piece = board[sq];
      if (piece) {
        const s = document.createElement('span');
        s.className = 'piece';
        s.textContent = GLYPH[piece];
        div.appendChild(s);
      }
      boardEl.appendChild(div);
    }
  }
  if (cur === 0) {
    captionEl.textContent = 'Starting position';
  } else {
    const moveNo = Math.ceil(cur / 2);
    const isWhite = cur % 2 === 1;
    captionEl.textContent = moveNo + (isWhite ? '. ' : '... ') + PLIES[cur-1].san;
  }
  document.querySelectorAll('#movelist .mv').forEach((el, i) => {
    el.classList.toggle('active', i === cur - 1);
  });
  document.getElementById('btnPrev').disabled = cur === 0;
  document.getElementById('btnStart').disabled = cur === 0;
  document.getElementById('btnNext').disabled = cur === STATES.length - 1;
  document.getElementById('btnEnd').disabled = cur === STATES.length - 1;
}

function goTo(n) { cur = Math.max(0, Math.min(STATES.length - 1, n)); render(); }

document.getElementById('btnStart').onclick = () => goTo(0);
document.getElementById('btnPrev').onclick = () => goTo(cur - 1);
document.getElementById('btnNext').onclick = () => goTo(cur + 1);
document.getElementById('btnEnd').onclick = () => goTo(STATES.length - 1);
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') goTo(cur - 1);
  if (e.key === 'ArrowRight') goTo(cur + 1);
});

// Move list
{
  const ml = document.getElementById('movelist');
  PLIES.forEach((ply, i) => {
    if (i % 2 === 0) {
      const num = document.createElement('span');
      num.className = 'num';
      num.textContent = (i / 2 + 1) + '.';
      ml.appendChild(num);
    }
    const mv = document.createElement('span');
    mv.className = 'mv';
    mv.textContent = ply.san;
    mv.onclick = () => goTo(i + 1);
    ml.appendChild(mv);
    ml.appendChild(document.createTextNode(' '));
  });
}

// ---- Conversation ----
// chip(n) = clickable move chip that jumps the board to ply n (1-based)

{w:'user', t:[`Hi Claude Fable, do you play chess?`]},

`Your move — White to play, move 2.`]},

`Your move, White.`]},
{w:'user', t:[`I will move my knight to f3. I want you to keep discussing your ideas, but please do not say anything about future moves, as it may influence my decisions.`]},
{w:'claude', t:[
`Understood — from here on I'll explain the reasoning behind moves already played, but keep concrete plans and variations to myself.`,
`I'll play {6}.`,
`We've now officially entered the Queen's Indian Defense — a classic response to exactly the move order you chose. Since the idea is baked into the move I just played, I can explain it without giving anything away: b6 prepares to develop my light-squared bishop onto the long a8–h1 diagonal, where it will exert pressure on the central light squares (especially e4) from a distance. It's the "hypermodern" philosophy in one move — instead of occupying the center with pawns, I aim pieces at it and invite you to overextend.`,

`Your move.`]},
{w:'user', t:[`{7}`]},
{w:'claude', t:[

`This 4...Ba6 line overtook the classical 4...Bb7 as the main choice at elite level decades ago, precisely because of this annoying little question. It taught me something when I first absorbed it: opening principles like "develop toward the center" are defaults, not laws. When a concrete feature of the position (an undefended pawn) presents itself, concrete play takes priority.`,
`Your move — and no hints from me on how the question is usually answered.`]},
{w:'user', t:[`{9}`]},
{w:'claude', t:[

`There's also a teaching point about timing here: a check like this is only annoying because your queenside pieces haven't sorted themselves out yet. The exact same bishop move three moves later would likely be harmless. Forcing moves — checks, captures, threats — derive their power from the specific moment they're played.`,
`White to move, and you must deal with the check.`]},
{w:'user', t:[`{11}`]},
{w:'claude', t:[
`The natural block. And now comes the move that reveals what the check was really for: {12}, retreating the bishop right back.`,
`This little dance — check on b4, then retreat to e7 — might look like I wasted two moves, and in a sense I did! But look at what I got in exchange: your dark-squared bishop now sits on d2, which is arguably its least inspiring square. It blocks your queen's path along the d-file, it has no targets on either diagonal, and it slightly clutters the coordination of your queenside pieces. To reroute it somewhere more active will cost you a move later, so the "two tempi" I spent bought a small but lasting positional annoyance. This exact sequence is established theory in the Queen's Indian — generations of grandmasters have judged the trade worthwhile.`,

{w:'claude', t:[

`Now you can see why I played c6 last move — it wasn't just defensive. It was preparing this advance, so that d5 arrives fully supported by both the c6 and e6 pawns. This is the hypermodern plan completing its arc: first I let you build a broad pawn center, developed my pieces to press against it, and now I stake my own claim in the middle at the moment my structure is ready to support it.`,

// SAN labels for chips, by ply number (1-based)
const CHIP_SAN = {};
PLIES.forEach((p, i) => {
  const moveNo = Math.ceil((i + 1) / 2);
  const prefix = (i % 2 === 0) ? moveNo + '. ' : moveNo + '... ';
  CHIP_SAN[i + 1] = prefix + p.san;
});

function esc(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

const chatEl = document.getElementById('chat');
CONVO.forEach(msg => {
  const div = document.createElement('div');
  div.className = 'msg ' + msg.w;
  const paras = msg.t.map(p => {
    const html = esc(p).replace(/\{(\d+)\}/g, (_, n) =>
      `<span class="movechip" onclick="goTo(${n})" title="Show on board">${CHIP_SAN[n]}</span>`);
    return `<p>${html}</p>`;
  }).join('');
  div.innerHTML = `<div class="who">${msg.w === 'user' ? 'Klas' : 'Claude Fable'}</div><div class="bubble">${paras}</div>`;
  chatEl.appendChild(div);
});

render();
